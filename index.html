<html>
    <head>
        <title>Activity 3</title>
        <style>
            table {
                border-collapse: separate; /* Allows for spacing between cells */
                border-spacing: 15px;      /* Space between the cells */
            }
            td {
                padding: 10px;            /* Space inside the cells */
                background-color: #f9f9f9; /* Optional: makes the grid easier to see */
            }
            img {
                border-radius: 8px;       /* Optional: rounds the corners of your bike photos */
            }
        </style>
    </head>
    <body>
        <table border="1px" width="100%" height="500" style="text-align: center;">
            <tr height="300px">
                <td><img src="images/bxt.jpg" alt="BXT" width="150"></td>
                <td><img src="images/cervelo.jpg" alt="CERVELO" width="150"></td>
                <td><img src="images/nelli.jpg" alt="CINELLI" width="150"></td>
            </tr>
            <tr height="50px">
                <td>BXT</td>
                <td>CERVELO</td>
                <td>CINELLI</td>
            </tr>
            <tr height="300">
                <td><img src="images/colossi.jpg" alt="COLOSSI" width="150"></td>
                <td><img src="images/look.jpg" alt="LOOK" width="150"></td>
                <td><img src="images/weapon.jpg" alt="WEAPON" width="150"></td>
            </tr>
            <tr height="50px">
                <td>COLOSSI</td>
                <td>LOOK</td>
                <td>WEAPON</td>
            </tr>
        </table>
    </body>
</html>
